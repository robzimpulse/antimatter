## Gradle Daemon JVM settings
# Increased heap for Gradle daemon — reduces GC pauses on large builds
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

## Android flags
android.useAndroidX=true
android.nonTransitiveRClass=true
android.enableR8.fullMode=true

## Kotlin
kotlin.code.style=official
kapt.use.k2=true

## Performance: Build Cache
# Caches task outputs so unchanged tasks are skipped on subsequent builds
org.gradle.caching=true

## Performance: Parallel Execution
# Runs independent modules in parallel (safe for this multi-module project)
org.gradle.parallel=true

## Performance: Configuration Cache (Gradle 8+)
# Caches the configuration phase so Gradle doesn't re-parse build scripts every run
org.gradle.configuration-cache=true

## Performance: File System Watching
# Keeps Gradle watching the filesystem between builds to avoid re-scanning
org.gradle.vfs.watch=true

## Termux Submodule Properties
compileSdkVersion=35
targetSdkVersion=35
minSdkVersion=24
ndkVersion=26.1.10909125
