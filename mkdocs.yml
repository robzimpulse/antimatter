site_name: Antimatter Documentation
site_description: Open-source bridge ecosystem connecting your mobile device to Google AntiGravity IDE
site_author: Saif Mukhtar

repo_name: saifmukhtar/antimatter
repo_url: https://github.com/saifmukhtar/antimatter
site_url: https://antimatter.saifmukhtar.dev
edit_uri: edit/main/docs/

theme:
  name: material
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Getting Started:
    - Installation & Setup: INSTALLATION.md
    - Features: FEATURES.md
    - Troubleshooting & FAQ: TROUBLESHOOTING.md
  - Architecture & Security:
    - Architecture: ARCHITECTURE.md
    - Zero Trust Guide: ZERO_TRUST.md
    - Security Policy: SECURITY.md
  - Reference:
    - WebSocket Protocol: PROTOCOL.md
    - VS Code Extension: EXTENSION.md
    - Android App: ANDROID.md
  - Project:
    - Contributing & Development: CONTRIBUTING.md
    - Roadmap: ROADMAP.md
    - Changelog: CHANGELOG.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
