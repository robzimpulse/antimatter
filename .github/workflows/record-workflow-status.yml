name: Record Workflow Status

on:
  workflow_run:
    workflows: ["*"] # Listen to all workflows
    types:
      - completed

permissions:
  contents: write

jobs:
  record:
    if: github.event.workflow_run.name != 'Record Workflow Status'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record Status and Generate Dashboard
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.workflow_run.head_commit.message }}
        run: |
          mkdir -p .github/ci-logs
          
          LOG_FILE=".github/ci-logs/workflow_logs.csv"
          DASH_FILE=".github/ci-logs/DASHBOARD.md"
          
          if [ ! -f "$LOG_FILE" ]; then
            echo "Date,Workflow,Status,Commit,URL" > "$LOG_FILE"
          fi
          
          DATE=$(date -u +"%Y-%m-%d %H:%M")
          WORKFLOW="${{ github.event.workflow_run.name }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          COMMIT_MSG="$HEAD_COMMIT_MESSAGE"
          COMMIT_MSG=$(echo "$COMMIT_MSG" | head -n 1 | tr -d ',' | tr -d '"' | tr -d '\n')
          URL="${{ github.event.workflow_run.html_url }}"
          
          # Map conclusion to emoji
          if [ "$CONCLUSION" = "success" ]; then
            STATUS_ICON="✅ PASS"
          elif [ "$CONCLUSION" = "failure" ]; then
            STATUS_ICON="❌ FAIL"
          elif [ "$CONCLUSION" = "cancelled" ]; then
            STATUS_ICON="⚠️ CANCEL"
          else
            STATUS_ICON="❓ $CONCLUSION"
          fi
          
          # Skip logging the status recorder itself to avoid infinite loops
          if [ "$WORKFLOW" = "Record Workflow Status" ]; then
            echo "Skipping logging for the logging workflow itself."
            exit 0
          fi
          
          # Append to log
          echo "$DATE,$WORKFLOW,$STATUS_ICON,$COMMIT_MSG,$URL" >> "$LOG_FILE"
          
          # Calculate stats
          TOTAL=$(tail -n +2 "$LOG_FILE" | wc -l)
          PASSED=$(tail -n +2 "$LOG_FILE" | grep "✅ PASS" | wc -l || true)
          FAILED=$(tail -n +2 "$LOG_FILE" | grep "❌ FAIL" | wc -l || true)
          
          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$(( (PASSED * 100) / TOTAL ))
          else
            PASS_RATE=0
          fi
          
          # Generate Dashboard
          echo "# 🔄 CI/CD WORKFLOW DASHBOARD" > "$DASH_FILE"
          echo "" >> "$DASH_FILE"
          echo "![Pass Rate](https://img.shields.io/badge/Pass%20Rate-${PASS_RATE}%25-brightgreen)" >> "$DASH_FILE"
          echo "![Total Runs](https://img.shields.io/badge/Total%20Runs-${TOTAL}-blue)" >> "$DASH_FILE"
          echo "" >> "$DASH_FILE"
          echo "| Metric | Count |" >> "$DASH_FILE"
          echo "|--------|-------|" >> "$DASH_FILE"
          echo "| **Total Runs** | ${TOTAL} |" >> "$DASH_FILE"
          echo "| **Passed** | ${PASSED} |" >> "$DASH_FILE"
          echo "| **Failed** | ${FAILED} |" >> "$DASH_FILE"
          echo "| **Pass Rate** | ${PASS_RATE}% |" >> "$DASH_FILE"
          echo "" >> "$DASH_FILE"
          echo "## Recent Runs" >> "$DASH_FILE"
          echo "" >> "$DASH_FILE"
          echo "| Date (UTC) | Workflow | Status | Commit | URL |" >> "$DASH_FILE"
          echo "|------------|----------|--------|--------|-----|" >> "$DASH_FILE"
          
          # Add the last 50 runs to the dashboard (reverse order so newest is first)
          tail -n +2 "$LOG_FILE" | tail -n 50 | tac | while IFS=, read -r d w s c u; do
            echo "| $d | $w | $s | $c | [View Log]($u) |" >> "$DASH_FILE"
          done
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/ci-logs/
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update workflow dashboard"
            git push
          fi
